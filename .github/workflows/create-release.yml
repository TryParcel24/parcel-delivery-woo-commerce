name: Create Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type (overrides commit message detection)'
        required: false
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Bump Version
        id: version-bump
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

          # Get current version from plugin header
          CURRENT_VERSION=$(grep -oP 'Version:\s*\K[0-9]+\.[0-9]+\.[0-9]+' parcel-delivery.php)
          
          # Use the explicit input from workflow_dispatch
          BUMP_TYPE="${{ inputs.bump }}"

          # Bump version using shell arithmetic
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"
          case "$BUMP_TYPE" in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac
          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"

          # Update version in plugin file header
          sed -i "s/Version: ${CURRENT_VERSION}/Version: ${NEW_VERSION}/" parcel-delivery.php
          
          echo "newTag=${NEW_VERSION}" >> $GITHUB_OUTPUT
          echo "Bumped version from ${CURRENT_VERSION} to ${NEW_VERSION}"

      - name: Build Plugin ZIP
        run: |
          zip -r -D "parcel-delivery-${{ steps.version-bump.outputs.newTag }}.zip" . \
            -x "./.git/*" \
            -x "./.github/*" \
            -x "./README.md" \
            -x "./*.zip" \
            -x "./.gitignore"

      - name: Commit, Push, and Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git add parcel-delivery.php
          git commit -m "CI: bump version to ${{ steps.version-bump.outputs.newTag }} [skip ci]" || true
          git tag "${{ steps.version-bump.outputs.newTag }}"
          git pull origin main --rebase
          git push origin HEAD:main --follow-tags
          gh release create "${{ steps.version-bump.outputs.newTag }}" \
            --target ${{ github.sha }} \
            --title "v${{ steps.version-bump.outputs.newTag }}" \
            --generate-notes \
            "parcel-delivery-${{ steps.version-bump.outputs.newTag }}.zip"
